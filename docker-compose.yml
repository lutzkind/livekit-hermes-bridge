services:
  bridge:
    image: livekit-hermes-bridge:latest
    build: .
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "8000"
      LIVEKIT_HOST: http://livekit-paob6cd3yz6t7cfdwnuahid1:7880
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"
      LIVEKIT_WS_URL: wss://livekit-bridge.46.224.200.122.sslip.io
      HERMES_API_URL: http://host.docker.internal:8642/v1
      HERMES_API_KEY: "${HERMES_API_KEY}"
      HERMES_MODEL: deepseek-v4-flash
      STT_MODEL: base
      TTS_VOICE: en-US-EricNeural
      TTS_RATE: +0%
      AGENT_NAME: "Hermes"
      LIVEKIT_AGENT_NAME: "hermes-voice"
    networks:
      - default
      - livekit_core

  voice-agent:
    image: livekit-hermes-bridge:latest
    build: .
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["python", "voice_agent.py", "start"]
    environment:
      LIVEKIT_URL: ws://livekit-paob6cd3yz6t7cfdwnuahid1:7880
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"
      HERMES_API_URL: http://host.docker.internal:8642/v1
      HERMES_API_KEY: "${HERMES_API_KEY}"
      HERMES_MODEL: deepseek-v4-flash
      STT_MODEL: base
      TTS_VOICE: en-US-EricNeural
      TTS_RATE: +0%
      AGENT_NAME: "Hermes"
      LIVEKIT_AGENT_NAME: "hermes-voice"
    networks:
      - default
      - livekit_core

  caddy:
    image: caddy:2
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.gzip.compress=true
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.routers.http-livekit-bridge.entryPoints=http
      - traefik.http.routers.http-livekit-bridge.rule=Host(`livekit-bridge.46.224.200.122.sslip.io`)
      - traefik.http.routers.http-livekit-bridge.middlewares=redirect-to-https
      - traefik.http.routers.https-livekit-bridge.entryPoints=https
      - traefik.http.routers.https-livekit-bridge.rule=Host(`livekit-bridge.46.224.200.122.sslip.io`)
      - traefik.http.routers.https-livekit-bridge.middlewares=gzip
      - traefik.http.routers.https-livekit-bridge.tls=true
      - traefik.http.routers.https-livekit-bridge.tls.certresolver=letsencrypt
      - traefik.http.services.livekit-bridge.loadbalancer.server.port=80
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - default
      - livekit_core
      - coolify

volumes:
  caddy_data:
  caddy_config:

networks:
  coolify:
    external: true
  livekit_core:
    external: true
    name: paob6cd3yz6t7cfdwnuahid1
