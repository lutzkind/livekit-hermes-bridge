version: "3.8"

services:
  # ── Bridge Web Server ──────────────────────────────────────────
  bridge:
    build: .
    image: livekit-hermes-bridge:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8000"
    environment:
      PORT: "8000"
      LIVEKIT_HOST: "${LIVEKIT_HOST}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"
      LIVEKIT_WS_URL: "${LIVEKIT_WS_URL}"
      HERMES_API_URL: "${HERMES_API_URL}"
      HERMES_API_KEY: "${HERMES_API_KEY}"
      HERMES_MODEL: "${HERMES_MODEL:-deepseek-v4-flash}"
      STT_MODEL: "${STT_MODEL:-base}"
      TTS_VOICE: "${TTS_VOICE:-en-US-EricNeural}"
      TTS_RATE: "${TTS_RATE:-+0%}"
      AGENT_NAME: "Hermes"
    volumes:
      - whisper_cache:/root/.cache

  # ── Voice Agent Worker ─────────────────────────────────────────
  voice-agent:
    build: .
    image: livekit-hermes-bridge:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["python", "voice_agent.py", "start"]
    environment:
      LIVEKIT_URL: "${LIVEKIT_WS_URL}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"
      HERMES_API_URL: "${HERMES_API_URL}"
      HERMES_API_KEY: "${HERMES_API_KEY}"
      HERMES_MODEL: "${HERMES_MODEL:-deepseek-v4-flash}"
      STT_MODEL: "${STT_MODEL:-base}"
      TTS_VOICE: "${TTS_VOICE:-en-US-EricNeural}"
      TTS_RATE: "${TTS_RATE:-+0%}"
      AGENT_NAME: "Hermes"
    volumes:
      - whisper_cache:/root/.cache

volumes:
  whisper_cache:
